{% extends "base.html" %}

{% block title %}Sign In - Amazon Clone{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-md p-8">
    <h2 class="text-2xl font-bold text-center mb-6">Sign In</h2>
    <form method="POST">
        <div class="mb-4">
            <label class="block text-gray-700 mb-2">Email</label>
            <input type="email" name="email" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
        </div>
        <div class="mb-6">
            <label class="block text-gray-700 mb-2">Password</label>
            <input type="password" name="password" required class="w-full px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-yellow-400">
        </div>
        <button type="submit" class="w-full btn-amazon text-black font-semibold py-2 rounded hover:bg-yellow-500 transition">
            Sign In
        </button>
    </form>
    <p class="mt-4 text-center">
        New to Amazon Clone? <a href="{{ url_for('auth.signup') }}" class="text-blue-600 hover:underline">Create account</a>
    </p>
</div>
{% endblock %}
